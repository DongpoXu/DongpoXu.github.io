# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# git clone https://github.com/iissnan/hexo-theme-next themes/next

# Site
title: Xu-Blog
subtitle: 养一猫一狗，猫叫啵啵，狗叫没想好~~
description: 许东坡的个人博客，未来的日子一起努力
keywords: 许东坡, 博客, 个人博客
author: Dongpo Xu
language: zh-CN
timezone: ''

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
## 如果您的网站位于子目录中，则将url设置为“ http://yoursite.com/child”，将根目录设置为“ / child /”
url: https://www.xudongpo.cn
root: /
# npm install hexo-abbrlink --save
permalink: posts/:abbrlink/
abbrlink:
  alg: crc32      #support crc16(default) and crc32
  rep: hex        #support dec(default) and hex
  drafts: false   #(true)Process draft,(false)Do not process draft. false(default) 
  # Generate categories from directory-tree
  # depth: the max_depth of directory-tree you want to generate, should > 0
  auto_category:
     enable: true  #true(default)
     depth:        #3(default)
     over_write: false 
  auto_title: false #enable auto title, it can auto fill the title by path
  auto_date: false #enable auto date, it can auto fill the date by time today
  force: false 
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
# 目录
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: 
  - "case/projects/**"

# Writing
# 写作
new_post_name: :title.md # File name of new posts 新帖子的文件名
default_layout: post
titlecase: false # Transform title into titlecase 将标题转换为标题
external_link:
  enable: true # Open external links in new tab 在新标签页中打开外部链接
  field: site # Apply to the whole site 应用于整个网站
  exclude: ''
filename_case: 0
render_drafts: false

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## Use post's date for updated date unless set in front-matter
# use_date_for_updated: false
updated_option: false

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
plugins: hexo-generate-feed

## Themes: https://hexo.io/themes/
theme: next

# Deployment
## Docs: https://hexo.io/docs/deployment.html
# npm install hexo-deployer-git
deploy:
  - type: git
    repository:
      # github: git@github.com:DongpoXu/DongpoXu.github.io.git
      # coding: git@e.coding.net:DongpoXu/dongpoxu.git
      # Blog: git@47.104.109.67:/home/git/hexo.git
      Rpi: pi@192.168.0.205:/var/repo/web_blog
    branch: master
  # - type: baidu_url_submitter

# 自动生成sitemap
sitemap:
  path: sitemap.xml
baidusitemap:
  path: baidu_url_submittersitemap.xml

# RSS订阅
# feed:
#   type: atom
#   path: atom.xml
#   limit: 20

# 本地搜索
search:
  path: search.xml
  field: post
  format: html
  limit: 10000

# npm install hexo-baidu-url-submit --save
# 百度提交
baidu_url_submit:
  count: 1000 ## 提交最新的一个链接
  host: www.xudongpo.cn ## 在百度站长平台中注册的域名
  token: 6TLZ5LcHJDF1x0Av # 请注意这是您的秘钥， 所以请不要把博客源代码发布在公众仓库里!
  path: baidu_urls.txt ## 文本文档的地址， 新链接会保存在此文本文档里

# npm install hexo-neat --save
# hexo-neat
# 博文压缩
neat_enable: true
# 压缩html
neat_html:
  enable: true
  exclude:
# 压缩css  
neat_css:
  enable: false
  exclude:
    - '**/*.min.css'
# 压缩js
neat_js:
  enable: false
  mangle: true
  output:
  compress:
  exclude:
    - '**/*.min.js'
