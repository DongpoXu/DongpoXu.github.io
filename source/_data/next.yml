# ---------------------------------------------------------------
# 主题核心配置设置
# 参见：https://theme-next.org/docs/theme-settings/
# ---------------------------------------------------------------

# 如果为false，则将_data / next.yml中的配置合并到默认配置中（重写）。
# 如果为true，则会使用_data / next.yml中的选项完全覆盖默认配置（覆盖）。 仅适用于NexT设置。
# 如果为true，则必须将默认NexT `_config.yml`中的所有配置复制到`next.yml`中。 如果您知道自己在做什么，请使用。
# 如果您想注释NextT的_config.yml中的某些选项，而不用编辑默认配置，则很有用。
override: true

# 控制台提示是否发布了新版本。
reminder: false

# 允许缓存内容生成，在 NexT v6.0.0 中引入。
cache:
  enable: true

# 生成十六进制后，删除不需要的文件。
minify: true

# 定义自定义文件路径。
# 在站点目录 “source/_data” 中创建自定义文件，并在下面取消注释所需的文件。
custom_file_path:
  #head: source/_data/head.swig
  header: source/_data/header.swig
  #sidebar: source/_data/sidebar.swig
  #postMeta: source/_data/post-meta.swig
  postBodyEnd: source/_data/post-body-end.swig
  footer: source/_data/footer.swig
  #bodyEnd: source/_data/body-end.swig
  #variable: source/_data/variables.styl
  #mixin: source/_data/mixins.styl
  style: source/_data/styles.styl

# ---------------------------------------------------------------
# 网站信息设置
# 参见：https://theme-next.org/docs/getting-started/
# ---------------------------------------------------------------

favicon:
  small: /images/xu.jpg
  medium: /images/xu.jpg
  apple_touch_icon: /images/xu.jpg
  safari_pinned_tab: /images/xu.jpg
  #android_manifest: /images/manifest.json
  #ms_browserconfig: /images/browserconfig.xml

# 在页脚中显示多语言切换器。
language_switcher: false

footer:
  # 指定网站的建立日期。 如果未定义，将使用当前年份。
  since:

  # 年份和版权信息之间的图标。
  icon:
    # Font Awesome中的图标名称。参见: https://fontawesome.com/v4.7.0/icons/
    # 默认为 `heart` 动画为 红色 (#ff0000)
    name: spinner
    # 如果要为图标设置动画，请将其设置为true
    animated: false
    # 改变图标的颜色，使用 Hex 代码。
    color: "#808080"

  # 如果为定义，使用Hexo `_config.yml` 中的 `author`
  copyright: DongpoXu

  # 由 Hexo & NexT 驱动，false 不显示。
  powered: false

  # 面向中国用户ICP备案以及公安信息。参阅: http://www.beian.miit.gov.cn, http://www.beian.gov.cn
  beian:
    enable: true
    icp: 吉ICP备 - 20003200号-1
    # 公安备案 id
    gongan_id: 22010402000838
    # 公安备案 完整
    gongan_num: 吉公网安备 22010402000838号
    # 公安备案图标。See: http://www.beian.gov.cn/portal/download
    gongan_icon_url: /images/备案图标.png

# Creative Commons 4.0国际许可。
# 参阅: https://creativecommons.org/share-your-work/licensing-types-examples
# 许可证值: by | by-nc | by-nc-nd | by-nc-sa | by-nd | by-sa | zero
# 如果您喜欢CC许可证的翻译版本，则可以设置语言值， e.g. deed.zh
# CC许可证提供39种语言的版本，您可以在其中找到所需的特定且正确的缩写：https://creativecommons.org
creative_commons:
  license: by-nc-sa
  sidebar: false
  post: false
  language: deed.zh

# ---------------------------------------------------------------
# 主题方案设定
# ---------------------------------------------------------------

# 方案
scheme: Muse
# scheme: Mist
# scheme: Pisces
# scheme: Gemini

# 夜览模式
darkmode: false

# ---------------------------------------------------------------
# 菜单设置
# ---------------------------------------------------------------

# 用法: `Key: /link/ || icon`
# Key是菜单项的名称。如果项目可以被翻译，则加载翻译后的文字，否则使用密钥民称，密钥区分大小写。
# “||”定界符之前的值是目标链接，“||”定界符之后的值是 Font Awesome 图标的名称。
# 当在子目录(e.g. yoursite.com/blog)中运行网站时, 请从链接值中删除斜杠(/archives -> archives).
# 外部网址应该以 http:// or https:// 开头
menu:
  home: /|| home
  sentence: /sentence/|| heart
  archives: /archives/|| archive
  categories: /categories/|| th
  tags: /tags/|| tags
  case: /case/|| flask
  about: /about/|| user
  #schedule: /schedule/ || calendar
  #sitemap: /sitemap.xml || sitemap
  #commonweal: /404/ || heartbeat

# 开启/关闭 menu icons / item badges.
menu_settings:
  icons: true
  badges: false

# ---------------------------------------------------------------
# 侧边栏设置
# 参阅: https://theme-next.org/docs/theme-settings/sidebar
# ---------------------------------------------------------------

sidebar:
  # 侧边栏位置
  # position: left
  position: right

  # 手动定义边栏宽度。如果有评论，则默认为：
  # Muse | Mist: 320
  # Pisces | Gemini: 240
  #width: 300

  # 侧边栏显示方式 (only for Muse | Mist), 可用值:
  #  - post    自动扩展帖子，默认。
  #  - always  展开所有页面。
  #  - hide    仅在点击侧边栏切换图标时展开。
  #  - remove  完全删除侧边栏，包括切换按钮。
  display: post

  # 侧边栏 padding 使用 pixels
  padding: 18
  # 侧边栏与顶部菜单栏的偏移量 使用 pixels (only for Pisces | Gemini)
  offset: 12
  # 在狭窄视窗中启用侧边栏 (only for Muse | Mist)
  onmobile: false

# 侧边栏头像
avatar:
  # 替换默认图片 url
  url: /images/xu.jpg
  # 如果为true，则头像将显示为圆形。
  rounded: true
  # 如果为true，则头像将随着光标旋转。
  rotated: true

# 侧边栏开启Posts/Categories/Tags
site_state: true

# 社交链接
# 用法: `Key: permalink || icon`
# Key 是显示给最终用户的链接标签。
# “||”定界符之前的值是目标永久链接，“||”定界符之后的值是Font Awesome图标的名称。
social:
  GitHub: https://github.com/DongpoXu || github
  E-Mail: mailto:aelousdp@163.com || envelope
  LeetCode: https://leetcode-cn.com/u/aelousdp/ || code
  #Weibo: https://weibo.com/yourname || weibo
  #Google: https://plus.google.com/yourname || google
  #Twitter: https://twitter.com/yourname || twitter
  #FB Page: https://www.facebook.com/yourname || facebook
  #StackOverflow: https://stackoverflow.com/yourname || stack-overflow
  #YouTube: https://youtube.com/yourname || youtube
  #Instagram: https://instagram.com/yourname || instagram
  #Skype: skype:yourname?call|chat || skype

social_icons:
  enable: true
  icons_only: false
  transition: false

# Blog 友情链接
links_settings:
  icon: link
  title: 友情链接
  # 可用值: block | inline
  layout: inline

links:
  #Title: http://yoursite.com
  午後のお茶で一杯: https://zpm683.xyz
  ItsCloudy: https://itscloudy.gitee.io/blog/
  1929's Home: https://asdfv1929.github.io/

# 侧边栏中的目录
# 前向变量 (不支持包装 expand_all)
toc:
  enable: true
  # 自动给目录添加数字标号。
  number: true
  # 如果为true，则所有标题将在标题宽度长于边栏宽度的情况下放在下一行。
  wrap: false
  # 如果为true，则将显示帖子中所有级别的TOC，而不是帖子中已激活的部分。
  expand_all: false
  # 生成的Toc的最大航向深度。
  max_depth: 6

# 在边栏中打开指定的聊天小部件的按钮。
# 首先，您需要启用要激活其侧边栏按钮的聊天服务。
chat:
  enable: false
  #service: chatra
  #service: tidio
  icon: comment # Font Awesome中的图标名称，将false设置为禁用图标。
  text: Chat # 按钮文本，根据需要进行更改。

# ---------------------------------------------------------------
# 发布设置
# 参阅: https://theme-next.org/docs/theme-settings/posts
# ---------------------------------------------------------------

# 自动摘录首页中的描述作为前导文字。
excerpt_description: true

# 阅读更多 按钮
# 如果为true，则“更多”按钮将显示在摘录部分中。
read_more_btn: true

# 发布 单元 显示设置
post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: false
    another_day: true
  categories: true

# 发布字数显示设置
# 依赖: https://github.com/theme-next/hexo-symbols-count-time
# npm install hexo-symbols-count-time --save
symbols_count_time:
  separated_meta: true
  item_text_post: true
  item_text_total: false

# 使用图标代替符号＃来指示帖子底部的标签
tag_icon: true

# 奖励 (捐赠)
# 前向变量 (不支持动画).
reward_settings:
  # If true, reward will be displayed in every article by default.
  enable: true
  animation: false
  comment: 如果您读文章后有收获，可以打赏我喝咖啡哦～

reward:
  # wechatpay: /images/wechat.png
  # alipay: /images/alipay.png
  common: /images/common.png
  #paypal: /images/paypal.png
  #bitcoin: /images/bitcoin.png

# 通过 Telegram Channel, Twitter, etc 进行订阅。
# 用法: `Key: permalink || icon` (Font Awesome)
follow_me:
  # Twitter: https://twitter.com/username || twitter
  # Telegram: https://t.me/channel_name || telegram
  # WeChat: /images/wechat_channel.jpg || wechat
  # RSS: /atom.xml || rss

# 相关热门帖子
# 依赖: https://github.com/tea3/hexo-related-popular-posts
related_posts:
  enable: false
  title: # 自定义标题，保留为空以使用默认标题
  display_in_home: false
  params:
    maxCount: 5
    #PPMixingRate: 0.0
    #isDate: false
    #isImage: false
    #isExcerpt: false

# 发布编辑
# 依赖: https://github.com/hexojs/hexo-deployer-git
post_edit:
  enable: false
  url: https://github.com/user-name/repo-name/tree/branch-name/subdirectory-name # Link for view source
  #url: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name # Link for fork & edit

# 在后页脚中显示上一个帖子和下一个帖子
# 可用值: left | right | false
post_navigation: left

# ---------------------------------------------------------------
# 自定义页面设置
# 参阅: https://theme-next.org/docs/theme-settings/custom-pages
# ---------------------------------------------------------------

# 标签页面的 标签云 设置
tagcloud:
  # 以下所有值均与默认值相同，请自行更改。
  min: 12 # 最小字体大小 px
  max: 30 # 最大字体大小 px
  start: "#ccc" # 起始颜色 (hex, rgba, hsla or color keywords)
  end: "#111" # 终止颜色 (hex, rgba, hsla or color keywords)
  amount: 200 # 标签数量，如果标签数量超过200，则进行更改

# Google 日历
# 通过日历页面与他人共享您最近的日程安排。
calendar:
  calendar_id: <required> # Your Google account E-Mail
  api_key: <required>
  orderBy: startTime
  offsetMax: 24 # Time Range
  offsetMin: 4 # Time Range
  showDeleted: false
  singleEvents: true
  maxResults: 250

# ---------------------------------------------------------------
# 主题 杂项 设置
# ---------------------------------------------------------------

# 在帖子/页面中设置文本对齐方式。
text_align:
  # 可用值: start | end | left | right | center | justify | justify-all | match-parent
  desktop: justify
  mobile: justify

# 减少宽度较窄的设备上的填充/边距缩进。
mobile_layout_economy: false

# Android Chrome标题面板颜色 ($brand-bg / $headband-bg => $black-deep).
android_chrome_color: "#222"

# 自定义 Logo (Do not support scheme Mist)
custom_logo: #/uploads/custom-logo.jpg

codeblock:
  # 主题代码突出显示
  # 可用值: normal | night | night eighties | night blue | night bright | solarized | solarized dark | galactic
  # See: https://github.com/chriskempson/tomorrow-theme
  highlight_theme: night
  # 在代码块上添加复制按钮
  copy_button:
    enable: true
    # 显示文字复制结果
    show_result: false
    # 可用值: default | flat | mac
    style: mac

back2top:
  enable: true
  # 侧边栏 返回首页 按钮
  sidebar: false
  # 显示滚动百分比
  scrollpercent: false

# 阅读进度条
reading_progress:
  enable: false
  # 可用值: top | bottom
  position: top
  color: "#37c6c0"
  height: 3px

# 书签支持
bookmark:
  enable: true
  # 自定义书签的颜色。
  color: "#222"
  # 如果为auto，请在关闭页面或单击书签图标时保存阅读进度。
  # 如果是manual的，则只能通过单击书签图标进行保存。
  save: manual

# 右上角横幅显示`Follow me on GitHub`
github_banner:
  enable: true
  permalink: https://github.com/DongpoXu
  title: Follow me on GitHub

# ---------------------------------------------------------------
# 字体设置
# 参阅: https://theme-next.org/docs/theme-settings/#Fonts-Customization
# ---------------------------------------------------------------
# 在Google字体（https://www.google.com/fonts）上查找字体
# 此处设置的所有字体将具有以下样式：
#   light | light italic | normal | normal italic | bold | bold italic
# 请注意，设置过多的字体会导致网站运行缓慢
# ---------------------------------------------------------------
# 为了避免在 Pisces / Gemini 中标题和侧边栏之间有空格, 建议全局使用 Web Safe fonts --- `global` (and `title`):
# Arial | Tahoma | Helvetica | Times New Roman | Courier New | Verdana | Georgia | Palatino | Garamond | Comic Sans MS | Trebuchet MS
# ---------------------------------------------------------------

font:
  enable: false

  # 字体的url, e.g. https://fonts.googleapis.com (Default).
  host:

  # 字体选项:
  # `external: true` will load this font family from `host` above.
  # `family: Times New Roman`. Without any quotes.
  # `size: x.x`. Use `em` as unit. Default: 1 (16px)

  # 用于<body>中所有元素的全局字体设置。
  global:
    external: true
    family: Lato
    size:

  # 网站标题的字体设置 (.site-title).
  title:
    external: true
    family:
    size:

  # 标题的字体设置 (<h1> to <h6>).
  headings:
    external: true
    family:
    size:

  # 帖子的字体设置 (.post-body).
  posts:
    external: true
    family:

  # <code>和代码块的字体设置。
  codes:
    external: true
    family:

# ---------------------------------------------------------------
# SEO 设置
# ---------------------------------------------------------------

# 在移动设备上禁用百度转换。
disable_baidu_transformation: false

# 如果为true，则站点字幕将添加到索引页面。
# 记住要在Hexo`_config.yml`中设置site-subtitle。(e.g. subtitle: Subtitle)
index_with_subtitle: true

# 自动使用Base64加密和解密添加外部URL。
exturl: true

# Google网站管理员工具验证。
# See: https://www.google.com/webmasters
google_site_verification:

# Bing Webmaster tools verification.
# See: https://www.bing.com/webmaster
bing_site_verification:

# Yandex Webmaster tools verification.
# See: https://webmaster.yandex.ru
yandex_site_verification:

# 百度网站管理员工具验证。
# See: https://ziyuan.baidu.com/site
baidu_site_verification: true

# 启用百度推送，以便博客将URL自动推送到百度，这对于SEO非常有用。
baidu_push: false

# ---------------------------------------------------------------
# 第三方插件和服务设置
# 参阅: https://theme-next.org/docs/third-party-services/
# 更多插件: https://github.com/theme-next/awesome-next
# 您可能需要在`vendors`中安装依赖项或设置CDN-URL
# 默认情况下，有两个不同的CDN提供程序：
#   - jsDelivr (cdn.jsdelivr.net), works everywhere even in China
#   - CDNJS (cdnjs.cloudflare.com), provided by cloudflare
# ---------------------------------------------------------------

# 数学公式渲染支持
math:
  # 默认（true）将按需加载 mathjax / katex 脚本。
  # 这只是渲染那些在 Front-matter 中具有 `mathjax：true` 的页面。
  # 如果将其设置为 false，它将在每一页加载 mathjax / katex srcipt
  per_page: true

  # 完整的 MathJax 支持需要 hexo-renderer-pandoc (or hexo-renderer-kramed)
  mathjax:
    enable: false
    # 参阅: https://mhchem.github.io/MathJax-mhchem/
    mhchem: false

  # hexo-renderer-markdown-it-plus (or hexo-renderer-markdown-it with markdown-it-katex plugin) required for full Katex support.
  katex:
    enable: false
    # See: https://github.com/KaTeX/KaTeX/tree/master/contrib/copy-tex
    copy_tex: false

# 在您的网站上轻松启用快速Ajax导航。
# 依赖: https://github.com/theme-next/theme-next-pjax
pjax: false

# FancyBox是一种工具，它提供了一种精美的方法来添加图像的缩放功能。
# 更多信息: https://fancyapps.com/fancybox
# 主题的source/lib下没有这个文件，所以，是从网络获取，导致本地调试是有问题的。
fancybox: true

# 一个用于缩放图像（例如中号）的JavaScript库。
# 不要同时启用“ fancybox”和“ mediumzoom”。
# 更多信息: https://github.com/francoischalifour/medium-zoom
mediumzoom: false

# Vanilla JavaScript插件，用于延迟加载图像。
# 更多信息: https://github.com/ApoorvSaxena/lozad.js
lazyload: false

# Pangu 支持
# 更多信息: https://github.com/vinta/pangu.js
pangu: false

# Quicklink 支持
# 不要同时启用“ pjax”和“ quicklink”
# 更多信息: https://github.com/GoogleChromeLabs/quicklink
# Front-matter (unsupport home archive).
quicklink:
  enable: false

  # 可以通过下面的主页和存档选项来控制主页和存档页面。
  # 此配置项与“启用”无关。
  home: false
  archive: false

  # 默认（true）将在加载事件触发后初始化快速链接。
  delay: true
  # 自定义一个时间，以毫秒为单位，浏览器必须在该时间之前执行预取。
  timeout: 3000
  # 默认值（true）将启用fetch（）或回退到XHR。
  priority: true

  # 为了获得更大的灵活性，您可以添加一些模式（RegExp，Function或Array）来忽略。
  # 参阅: https://github.com/GoogleChromeLabs/quicklink#custom-ignore-patterns
  ignores:

# ---------------------------------------------------------------
# 评论设置
# 参阅: https://theme-next.org/docs/third-party-services/comments
# ---------------------------------------------------------------

# 多评论系统支持
comments:
  # 可用值: tabs | buttons
  style: tabs
  # 选择默认显示的评论系统。
  # 可用值: changyan | disqus | disqusjs | gitalk | livere | valine
  active: valine
  # 设置为“ true”意味着记住访问者选择的评论系统。
  storage: true
  # 延迟加载所有的评论系统
  lazyload: false
  # 修改任何导航的文本或顺序，以下是一些示例。
  nav:
    #disqus:
    #  text: Load Disqus
    #  order: -1
    #gitalk:
    #  order: -2

# Disqus
disqus:
  enable: false
  shortname:
  count: true
  #post_meta_order: 0

# DisqusJS
# Alternative Disqus - Render comment component using Disqus API.
# Demo: https://suka.js.org/DisqusJS/
# 更多信息: https://github.com/SukkaW/DisqusJS
disqusjs:
  enable: false
  # API Endpoint of Disqus API (https://disqus.com/api/).
  # Leave api empty if you are able to connect to Disqus API. Otherwise you need a reverse proxy for it.
  # For example:
  # api: https://disqus.skk.moe/disqus/
  api:
  apikey: # Register new application from https://disqus.com/api/applications/
  shortname: # See: https://disqus.com/admin/settings/general/

# Changyan
changyan:
  enable: false
  appid:
  appkey:
  #post_meta_order: 0

# Valine
# 更多信息: https://valine.js.org, https://github.com/xCss/Valine
valine:
  enable: true
  appid: IgXUs8o4trUx8BIt56GW7Ac4-gzGzoHsz # Your leancloud application appid
  appkey: 5EN3Kw3h7ER24APkfyxQKkdp # Your leancloud application appkey
  notify: true # Mail notifier
  verify: true # Verification code
  placeholder: 欢迎～说点什么吧～ # Comment box placeholder
  avatar: mm # Gravatar style
  guest_info: nick,mail,link # Custom comment header
  pageSize: 10 # Pagination size
  language: zh-cn # Language, 可用值: en, zh-cn
  visitor: true # Article reading statistic
  comment_count: true # If false, comment count will only be displayed in post page, not in home page
  recordIP: false # 是否记录评论者IP
  serverURLs: # When the custom domain name is enabled, fill it in here (it will be detected automatically by default, no need to fill in)
  #post_meta_order: 0

# LiveRe comments system
# You can get your uid from https://livere.com/insight/myCode (General web site)
livere_uid: # <your_uid>

# Gitalk
# 更多信息: https://gitalk.github.io, https://github.com/gitalk/gitalk
gitalk:
  enable: false
  github_id: # GitHub repo owner
  repo: # Repository name to store issues
  client_id: # GitHub Application Client ID
  client_secret: # GitHub Application Client Secret
  admin_user: # GitHub repo owner and collaborators, only these guys can initialize gitHub issues
  distraction_free_mode: true # Facebook-like distraction free mode
  # Gitalk's display language depends on user's browser or system environment
  # If you want everyone visiting your site to see a uniform language, you can set a force language value
  # 可用值: en | es-ES | fr | ru | zh-CN | zh-TW
  language:

# ---------------------------------------------------------------
# 张贴小工具和内容共享服务
# 参阅: https://theme-next.org/docs/third-party-services/post-widgets
# ---------------------------------------------------------------

# 每篇文章的星级评定支持。
# 获取ID请访问 https://widgetpack.com
rating:
  enable: false
  id: # <app_id>
  color: fc6423

# AddThis Share. See: https://www.addthis.com
# Go to https://www.addthis.com/dashboard to customize your tools.
add_this_id:

# ---------------------------------------------------------------
# 统计与分析
# 参阅: https://theme-next.org/docs/third-party-services/statistics-and-analytics
# ---------------------------------------------------------------

# Google Analytics
google_analytics:
  tracking_id: # <app_id>
  # By default, NexT will load an external gtag.js script on your site.
  # If you only need the pageview feature, set the following option to true to get a better performance.
  only_pageview: false

# Baidu Analytics
baidu_analytics: # <app_id>

# Growingio Analytics
growingio_analytics: # <project_id>

# CNZZ count
cnzz_siteid:

# 显示每篇文章的访客数量。
# You can visit https://leancloud.cn to get AppID and AppKey.
# AppID and AppKey are recommended to be the same as valine's for counter compatibility.
# 不要同时启用“ valine.visitor”和“ leancloud_visitors”。
leancloud_visitors:
  enable: false
  app_id: # <your app id>
  app_key: # <your app key>
  # Required for apps from CN region
  server_url: # <your server url>
  # Dependencies: https://github.com/theme-next/hexo-leancloud-counter-security
  # If you don't care about security in leancloud counter and just want to use it directly
  # (without hexo-leancloud-counter-security plugin), set `security` to `false`.
  security: true

# Another tool to show number of visitors to each article.
# Visit https://console.firebase.google.com/u/0/ to get apiKey and projectId.
# Visit https://firebase.google.com/docs/firestore/ to get more information about firestore.
firestore:
  enable: false
  collection: articles # Required, a string collection name to access firestore database
  apiKey: # Required
  projectId: # Required

# Show Views / Visitors of the website / page with busuanzi.
# Get more information on http://ibruce.info/2015/04/04/busuanzi
busuanzi_count:
  enable: false
  total_visitors: true
  total_visitors_icon: user
  total_views: true
  total_views_icon: eye
  post_views: false
  post_views_icon: eye

# ---------------------------------------------------------------
# 搜索服务
# 参阅: https://theme-next.org/docs/third-party-services/search-services
# ---------------------------------------------------------------

# Algolia Search
# 更多信息: https://www.algolia.com
algolia_search:
  enable: false
  hits:
    per_page: 10
  labels:
    input_placeholder: Search for Posts
    hits_empty: "We didn't find any results for the search: ${query}"
    hits_stats: "${hits} results found in ${time} ms"

# Local Search
# Dependencies: https://github.com/theme-next/hexo-generator-searchdb
local_search:
  enable: true
  # If auto, 通过更改输入触发搜索。
  # If manual, 通过按Enter键或搜索按钮触发搜索。
  trigger: auto
  # 显示每篇文章的前n个结果，通过设置为-1显示所有结果
  top_n_per_article: 1
  # 将html字符串转义为可读的字符串。
  unescape: false
  # 页面加载时预加载搜索数据。
  preload: true

# Swiftype Search API Key
swiftype_key:

# ---------------------------------------------------------------
# 聊天服务
# 参阅: https://theme-next.org/docs/third-party-services/chat-services
# ---------------------------------------------------------------

# 聊天支持
# 参阅: https://chatra.io
# Dashboard: https://app.chatra.io/settings/general
chatra:
  enable: false
  async: true
  id: # Visit Dashboard to get your ChatraID
  #embed: # Unfinished experimental feature for developers. See: https://chatra.io/help/api/#injectto

# Tidio Support
# See: https://www.tidiochat.com
# Dashboard: https://www.tidiochat.com/panel/dashboard
tidio:
  enable: false
  key: # Public Key, get it from dashboard. See: https://www.tidiochat.com/panel/settings/developer

# ---------------------------------------------------------------
# 标签设置
# 参阅: https://theme-next.org/docs/tag-plugins/
# ---------------------------------------------------------------

# Note tag (bs-callout)
note:
  # Note tag style values:
  #  - simple    bs-callout old alert style. Default.
  #  - modern    bs-callout new (v2-v3) alert style.
  #  - flat      flat callout style with background, like on Mozilla or StackOverflow.
  #  - disabled  disable all CSS styles import of note tag.
  style: simple
  icons: false
  # Offset lighter of background in % for modern and flat styles (modern: -12 | 12; flat: -18 | 6).
  # Offset also applied to label tag variables. This option can work with disabled note tag.
  light_bg_offset: 0

# Tabs tag
tabs:
  transition:
    tabs: false
    labels: true

# PDF tag
# NexT will try to load pdf files natively, if failed, pdf.js will be used.
# So, you have to install the dependency of pdf.js if you want to use pdf tag and make it available to all browsers.
# See: https://github.com/theme-next/theme-next-pdf
pdf:
  enable: false
  # Default height
  height: 500px

# Mermaid tag
mermaid:
  enable: false
  # Available themes: default | dark | forest | neutral
  theme: forest

# ---------------------------------------------------------------
# 动画设置
# ---------------------------------------------------------------

# Use velocity to animate everything.
# 更多信息: http://velocityjs.org
motion:
  enable: true
  async: false
  transition:
    # Transition variants:
    # fadeIn | flipXIn | flipYIn | flipBounceXIn | flipBounceYIn
    # swoopIn | whirlIn | shrinkIn | expandIn
    # bounceIn | bounceUpIn | bounceDownIn | bounceLeftIn | bounceRightIn
    # slideUpIn | slideDownIn | slideLeftIn | slideRightIn
    # slideUpBigIn | slideDownBigIn | slideLeftBigIn | slideRightBigIn
    # perspectiveUpIn | perspectiveDownIn | perspectiveLeftIn | perspectiveRightIn
    post_block: fadeIn
    post_header: slideDownIn
    post_body: slideDownIn
    coll_header: slideLeftIn
    # Only for Pisces | Gemini.
    sidebar: slideUpIn

# Progress bar in the top during page loading.
# Dependencies: https://github.com/theme-next/theme-next-pace
# 更多信息: https://github.com/HubSpot/pace
# 需要把 https://github.com/theme-next/theme-next-pace clone 到 theme/next 的 source/lib 中
pace:
  enable: true
  # Themes list:
  # big-counter | bounce | barber-shop | center-atom | center-circle | center-radar | center-simple
  # corner-indicator | fill-left | flat-top | flash | loading-bar | mac-osx | material | minimal
  theme: minimal

# JavaScript 3D library.
# Dependencies: https://github.com/theme-next/theme-next-three
three:
  enable: false
  three_waves: false
  canvas_lines: false
  canvas_sphere: false

# Canvas-ribbon
# Dependencies: https://github.com/theme-next/theme-next-canvas-ribbon
# 更多信息: https://github.com/zproo/canvas-ribbon
canvas_ribbon:
  enable: false
  size: 300 # The width of the ribbon
  alpha: 0.6 # The transparency of the ribbon
  zIndex: -1 # The display level of the ribbon

